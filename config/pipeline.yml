# Pipeline configuration — pin versions for reproducibility.

paths:
  csv: input/product_page_info_bath_bombs_all.csv
  # Second source: Keepa product-data export (one row per ASIN, joined on asin).
  keepa_csv: /Users/tianyu/Library/CloudStorage/Dropbox-Personal/ASIN_number_of_units/keepa_data/bath_bombs_all/product/static/product_data_bath_bombs_all_2025-07-15-03-00-02.csv
  # HTML snapshots are NOT used by the pipeline anymore — only for the optional
  # "view Amazon page" panel in the review console (scripts/label_ui.py).
  html_dir: /Users/tzheng/Library/CloudStorage/Dropbox-HarvardUniversity/Tianyu Zheng/ASIN_number_of_units/amazon_web_scraping/asin_level/html/bath_bombs_all/bath_bombs_all
  output_csv: output/product_counts.csv
  labeling_sample_csv: output/labeling_sample.csv
  manual_labels_csv: data/gold/manual_labels.csv

columns_to_keep:
  - asin
  - asin_in_html
  - title
  - brand
  - manufacturer
  - price
  - per_unit_price_text
  - unit_text
  - per_unit_price
  - unit_num
  - label_unit
  - label_unit_num
  - number_of_items
  - item_weight
  - size
  - badge_label
  - image_num
  - variation_quantity
  - product_dimensions
  - feature
  - product_description

scope:
  include_shower_bombs: true
  include_shower_steamers: false
  include_bath_melts: false
  include_fizz_tablets: false

# Purity rules. strict=true (default): kit/not-bomb/positive matched on TITLE primarily,
# reducing false excludes from brand/feature wording.
purity:
  strict: true

# Keepa second source. When enabled, keepa_* fields are joined on asin and used
# as a fallback / second signal for counts, resolver and purity.
# Degrades gracefully to null columns if the source file is not available.
keepa:
  enabled: true
  image_url_prefix: "https://m.media-amazon.com/images/I/"

labeling:
  sample_size: 300
  seed: 42
